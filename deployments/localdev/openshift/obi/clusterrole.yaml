apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: otel-ebpf-instrument
  labels:
    app.kubernetes.io/name: otel-ebpf-instrument
    app.kubernetes.io/component: instrumentation
    app.kubernetes.io/part-of: mirador
rules:
  # Required for discovering pods and services to instrument
  - apiGroups: [""]
    resources:
      - pods
      - namespaces
      - nodes
      - services
      - endpoints
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources:
      - replicasets
      - deployments
      - daemonsets
      - statefulsets
    verbs: ["get", "list", "watch"]
  # Required for OpenShift-specific resources
  - apiGroups: ["apps.openshift.io"]
    resources:
      - deploymentconfigs
    verbs: ["get", "list", "watch"]
