apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

metadata:
  name: otel-ebpf-instrument

namespace: mirador-observability

labels:
  - includeSelectors: true
    pairs:
      app.kubernetes.io/part-of: mirador
      app.kubernetes.io/managed-by: kustomize

resources:
  - serviceaccount.yaml
  - clusterrole.yaml
  - clusterrolebinding.yaml
  - scc.yaml
  - configmap.yaml
  - daemonset.yaml

commonLabels:
  app.kubernetes.io/version: "main"

images:
  - name: docker.io/otel/ebpf-instrument
    newTag: "main"
